name: Push Agents Bundle to R2

on:
  push:
    branches:
      - main
    paths:
      - 'packages/agents-bundle/**'

jobs:
  push-bundle:
    name: Push bundle to Cloudflare R2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate hashes
        run: node packages/agents-bundle/scripts/generate-manifest.js

      - name: Read manifest metadata
        id: manifest
        run: |
          VERSION=$(node -e "console.log(require('./packages/agents-bundle/manifest.json').version)")
          CHANNEL=$(node -e "console.log(require('./packages/agents-bundle/manifest.json').channel)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Configure AWS CLI for R2
        run: |
          aws configure set aws_access_key_id "${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region auto

      - name: Check version does not already exist on R2
        env:
          VERSION: ${{ steps.manifest.outputs.version }}
          CHANNEL: ${{ steps.manifest.outputs.channel }}
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          EXISTS=$(aws s3 ls "s3://$R2_BUCKET/channels/$CHANNEL/$VERSION/" \
            --endpoint-url "$R2_ENDPOINT" 2>&1 || true)
          if echo "$EXISTS" | grep -q "agents/\|workflows/"; then
            echo "ERROR: Bundle version $VERSION already exists on channel $CHANNEL."
            echo "Bump the version in manifest.json before pushing."
            exit 1
          fi

      - name: Upload bundle files to versioned path
        env:
          VERSION: ${{ steps.manifest.outputs.version }}
          CHANNEL: ${{ steps.manifest.outputs.channel }}
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          aws s3 sync packages/agents-bundle/ \
            "s3://$R2_BUCKET/channels/$CHANNEL/$VERSION/" \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "scripts/*" \
            --exclude "CHANGELOG.md" \
            --exclude "package.json" \
            --exclude ".wrangler/*" \
            --exclude ".gitkeep"

      - name: Upload manifest.json to channel root
        env:
          VERSION: ${{ steps.manifest.outputs.version }}
          CHANNEL: ${{ steps.manifest.outputs.channel }}
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          aws s3 cp packages/agents-bundle/manifest.json \
            "s3://$R2_BUCKET/channels/$CHANNEL/manifest.json" \
            --endpoint-url "$R2_ENDPOINT"

      - name: Log success
        env:
          VERSION: ${{ steps.manifest.outputs.version }}
          CHANNEL: ${{ steps.manifest.outputs.channel }}
        run: |
          echo "✅ Bundle $VERSION pushed to channel $CHANNEL."
