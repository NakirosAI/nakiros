name: Release nakiros to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing + provenance attestation (OIDC).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing requires npm >= 11.5.1 (Node 20 ships with 10.x).
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Verify tag matches package version
        run: |
          RAW_TAG="${GITHUB_REF##*/}"
          # Accept both `v0.1.0-beta.1` and `0.1.0-beta.1` as valid tag formats.
          TAG="${RAW_TAG#v}"
          PKG_VERSION=$(node -p "require('./apps/nakiros/package.json').version")
          if [ "${TAG}" != "${PKG_VERSION}" ]; then
            echo "::error::Release tag '${RAW_TAG}' (normalized '${TAG}') does not match apps/nakiros package version '${PKG_VERSION}'. Bump the version in apps/nakiros/package.json and re-tag."
            exit 1
          fi
          echo "Tag ${RAW_TAG} matches package version ${PKG_VERSION} — ok."

      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          VERSION=$(node -p "require('./apps/nakiros/package.json').version")
          if [[ "${VERSION}" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "${VERSION}" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "${VERSION}" == *"-rc"* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --filter @nakirosai/nakiros

      # Auth is handled by npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
      # Requires a trusted publisher configured for the `@nakirosai/nakiros`
      # package on npmjs.com:
      #   Settings → Trusted publishers → Add → GitHub Actions
      #   Owner: NakirosAI / Repo: nakiros / Workflow: release.yml
      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.dist_tag.outputs.tag }}
        working-directory: apps/nakiros
