name: fetch-project-context
description: "Collect scoped project context: config, workspace repos, git state, existing docs, and optional ticket details"
author: "Tiqora"

# Workflow engine bootstrap (required by _tiqora/core/tasks/workflow.xml)
config_source: "{project-root}/.tiqora.yaml"
date: system-generated

# Workflow components
installed_path: "{project-root}/_tiqora/workflows/4-implementation/fetch-project-context"
instructions: "{installed_path}/instructions.xml"

# Runtime paths
project_config: "{project-root}/.tiqora.yaml"
profile_config: "~/.tiqora/config.yaml"
workspace_config: "{project-root}/.tiqora.workspace.yaml"
context_dir: "{project-root}/.tiqora/context"
steps_dir: "{project-root}/.tiqora/workflows/steps"

# Defaults
default_communication_language: "Français"
default_document_language: "English"
