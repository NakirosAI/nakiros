name: sprint
description: "Sprint planning and retrospective: review current sprint state, plan next sprint, distribute tickets, update PM"
author: "Tiqora"

# Workflow engine bootstrap
config_source: "{project-root}/.tiqora.yaml"
date: system-generated

# Workflow components
installed_path: "{project-root}/_tiqora/workflows/5-reporting/sprint"
instructions: "{installed_path}/instructions.xml"

# Runtime paths
project_config: "{project-root}/.tiqora.yaml"
profile_config: "~/.tiqora/config.yaml"
workspace_config: "{project-root}/.tiqora.workspace.yaml"
sprints_dir: "{project-root}/.tiqora/sprints"
reports_dir: "{project-root}/.tiqora/reports"

# PM defaults
pm_done_status: "Done"
pm_in_progress_status: "In Progress"
pm_todo_status: "To Do"

# Defaults
default_communication_language: "Français"
default_document_language: "English"
