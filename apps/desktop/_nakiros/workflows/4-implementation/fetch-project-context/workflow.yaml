name: fetch-project-context
description: "Collect scoped project context: config, workspace repos, git state, existing docs, and optional ticket details"
author: "Nakiros"

# Workflow engine bootstrap (required by ~/.nakiros/core/tasks/workflow.xml)
config_source: "{project-root}/.nakiros.yaml"
date: system-generated

# Workflow components
installed_path: "{project-root}/~/.nakiros/workflows/4-implementation/fetch-project-context"
instructions: "{installed_path}/instructions.xml"

# Runtime paths
project_config: "{project-root}/.nakiros.yaml"
profile_config: "~/.nakiros/config.yaml"
workspace_config: "{project-root}/.nakiros.workspace.yaml"
context_dir: "{project-root}/.nakiros/context"
steps_dir: "{project-root}/.nakiros/workflows/steps"

# Defaults
default_communication_language: "Français"
default_document_language: "English"
