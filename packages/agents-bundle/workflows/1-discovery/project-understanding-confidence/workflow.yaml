name: project-understanding-confidence
description: "Assess AI onboarding confidence on an existing project by scanning repos and docs, scoring understanding readiness, and listing missing context."
author: "Nakiros"

# Workflow engine bootstrap
config_source: "~/.nakiros/config.yaml"
date: system-generated

# Workflow components
installed_path: "~/.nakiros/workflows/1-discovery/project-understanding-confidence"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

# Runtime paths
profile_config: "~/.nakiros/config.yaml"
workspace_config: "workspace.yaml"
workspace_root_dir: "~/.nakiros/workspaces/{workspace_slug}"
steps_dir: "{workspace_root_dir}/runs/steps"
workspace_confidence_dir: "{workspace_root_dir}/reports/confidence"
default_execution_repository_mode: "workspace-control"

# Defaults
default_communication_language: "Français"
default_document_language: "English"

# Scoring model
score_threshold_confident: 85
score_threshold_partial: 65
minimum_repo_coverage_percent: 100
weight_skill_coverage: 20
weight_project_understanding: 25
weight_documentation_ticket_readiness: 20
weight_testability_readiness: 20
weight_operational_readiness: 15
