name: dev-story
description: "Execute a Nakiros story with workspace-global context, architect-defined technical tasks, gitflow branch discipline, dedicated worktree execution, validation, and review package generation"
author: "Nakiros"

# Workflow engine bootstrap (required by ~/.nakiros/core/tasks/workflow.xml)
config_source: "~/.nakiros/config.yaml"
date: system-generated

# Workflow components
installed_path: "~/.nakiros/workflows/3-implementation/dev-story"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

# Runtime paths
profile_config: "~/.nakiros/config.yaml"
workspace_config: "workspace.yaml"
workspace_root_dir: "~/.nakiros/workspaces/{workspace_slug}"
workspace_context_root: "~/.nakiros/workspaces/{workspace_slug}/context"
active_run_file: "{workspace_root_dir}/state/active-run.json"
workflow_runs_dir: "{workspace_root_dir}/runs"
workflow_steps_dir: "{workspace_root_dir}/runs/steps"
worktrees_root_dir: "{workspace_root_dir}/worktrees"
sync_queue_file: "{workspace_root_dir}/sync/queue.json"

# PM tracking defaults used by instructions.xml
pm_in_progress_status: "In Progress"
pm_review_status: "In Review"
pm_done_status: "Done"
pm_blocked_status: "Blocked"
worklog_rounding_minutes: 15
minimum_worklog_minutes: 15
default_feature_base_branch: "develop"
default_bugfix_base_branch: "develop"
default_hotfix_base_branch: "main"

# Defaults applied by instructions.xml after config merge
default_user_name: "Developer"
default_idle_threshold_minutes: 15
default_communication_language: "Français"
default_document_language: "English"
