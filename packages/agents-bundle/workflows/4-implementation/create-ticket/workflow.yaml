name: create-ticket
description: "Create a structured PM ticket (bug, feature, task, or chore) with clear fields and PM sync"
author: "Nakiros"

# Workflow engine bootstrap
config_source: "~/.nakiros/config.yaml"
date: system-generated

# Workflow components
installed_path: "~/.nakiros/workflows/4-implementation/create-ticket"
instructions: "{installed_path}/instructions.xml"

# Runtime paths
profile_config: "~/.nakiros/config.yaml"
workspace_config: "{project-root}/_nakiros/workspace.yaml"
workspace_root_dir: "~/.nakiros/workspaces/{workspace_slug}"
tickets_dir: "{workspace_root_dir}/tickets"
created_ticket_file: "{tickets_dir}/{{ticketId}}.json"
sync_queue_file: "{workspace_root_dir}/sync/queue.json"

# PM defaults
pm_todo_status: "To Do"

# Defaults
default_communication_language: "Français"
default_document_language: "English"
