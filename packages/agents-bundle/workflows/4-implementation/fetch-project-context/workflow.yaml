name: fetch-project-context
description: "Collect scoped project context: config, workspace repos, git state, existing docs, and optional ticket details"
author: "Nakiros"

# Workflow engine bootstrap (required by ~/.nakiros/core/tasks/workflow.xml)
config_source: "~/.nakiros/config.yaml"
date: system-generated

# Workflow components
installed_path: "~/.nakiros/workflows/4-implementation/fetch-project-context"
instructions: "{installed_path}/instructions.xml"

# Runtime paths
profile_config: "~/.nakiros/config.yaml"
workspace_config: "{project-root}/_nakiros/workspace.yaml"
workspace_root_dir: "~/.nakiros/workspaces/{workspace_slug}"
context_dir: "{workspace_root_dir}/context"
steps_dir: "{workspace_root_dir}/runs/steps"

# Defaults
default_communication_language: "Français"
default_document_language: "English"
