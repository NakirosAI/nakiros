name: generate-context
description: "Generate stable repo and workspace context files for humans and agents: architecture, stack, conventions, API, llms, global-context, product-context, and inter-repo."
author: "Nakiros"

# Workflow engine bootstrap
config_source: "~/.nakiros/config.yaml"
date: system-generated

# Workflow components
installed_path: "~/.nakiros/workflows/4-implementation/generate-context"
steps_path: "{installed_path}/steps"

# Runtime paths
project_config: "{project-root}/.nakiros.yaml"
profile_config: "~/.nakiros/config.yaml"
workspace_config: "{project-root}/_nakiros/workspace.yaml"
workspace_root_dir: "~/.nakiros/workspaces/{workspace_slug}"
workspace_context_dir: "{workspace_root_dir}/context"
workspace_findings_dir: "{workspace_root_dir}/.findings"

# Output paths - per repo
per_repo_doc_dir: "{repo_localPath}/_nakiros"
per_repo_architecture: "{per_repo_doc_dir}/architecture.md"
per_repo_stack: "{per_repo_doc_dir}/stack.md"
per_repo_conventions: "{per_repo_doc_dir}/conventions.md"
per_repo_api: "{per_repo_doc_dir}/api.md"
per_repo_llms: "{per_repo_doc_dir}/llms.txt"

# Output paths - workspace level
workspace_output_dir: "{workspace_context_dir}"
global_output: "{workspace_output_dir}/global-context.md"
product_output: "{workspace_output_dir}/product-context.md"
inter_repo_output: "{workspace_output_dir}/inter-repo.md"

# Findings paths - temporary, written by sub-agents, cleaned up after synthesis
arch_findings: "{per_repo_doc_dir}/.findings/arch.json"
product_findings: "{workspace_findings_dir}/product.json"
inter_repo_findings: "{workspace_findings_dir}/inter-repo.json"

# Defaults
default_communication_language: "Français"
default_document_language: "English"
