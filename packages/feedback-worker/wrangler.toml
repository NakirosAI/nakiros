name = "nakiros-feedback"
main = "src/index.ts"
compatibility_date = "2026-01-01"

routes = [
  { pattern = "feedback.nakiros.com/*", zone_name = "nakiros.com" }
]

[[d1_databases]]
binding = "FEEDBACK_DB"
database_name = "nakiros-feedback"
database_id = "50f1c2a9-eb67-40a3-96e7-bfa3d366c4b8"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "nakiros-feedback-conversations"

# ─── Secrets (set via `wrangler secret put`) ──────────────────────────────────
# NAKIROS_FEEDBACK_KEY
#
# ─── Rate limiting (configure in Cloudflare dashboard) ────────────────────────
# /session  → 30 req/hour per IP
# /product  → 10 req/hour per IP
